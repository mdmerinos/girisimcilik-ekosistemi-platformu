name: ODTÜ Teknokent Worker

on:
  workflow_dispatch:
  schedule:
    - cron: "40 6 * * *"
    - cron: "40 12 * * *"
    - cron: "40 18 * * *"

permissions:
  contents: read

concurrency:
  group: odtu-teknokent-worker
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify worker secrets
        shell: bash
        env:
          WORKER_INGESTION_URL: ${{ secrets.WORKER_INGESTION_URL }}
          WORKER_INGESTION_SECRET: ${{ secrets.WORKER_INGESTION_SECRET }}
        run: |
          test -n "$WORKER_INGESTION_URL" || { echo "::error::WORKER_INGESTION_URL is not configured"; exit 1; }
          test -n "$WORKER_INGESTION_SECRET" || { echo "::error::WORKER_INGESTION_SECRET is not configured"; exit 1; }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: workers/odtu-teknokent/requirements.txt

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install worker dependencies
        run: python -m pip install -r workers/odtu-teknokent/requirements.txt

      - name: Collect and submit ODTÜ Teknokent opportunities
        env:
          WORKER_INGESTION_URL: ${{ secrets.WORKER_INGESTION_URL }}
          WORKER_INGESTION_SECRET: ${{ secrets.WORKER_INGESTION_SECRET }}
        run: python workers/odtu-teknokent/odtu_teknokent_worker.py
