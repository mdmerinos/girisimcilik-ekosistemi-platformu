name: NATO DIANA external worker

on:
  workflow_dispatch:
  schedule:
    - cron: "20 6 * * *"

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: workers/nato-diana/requirements.txt

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install worker dependencies
        run: python -m pip install -r workers/nato-diana/requirements.txt

      - name: Collect and submit NATO DIANA opportunities
        env:
          WORKER_INGESTION_URL: ${{ secrets.WORKER_INGESTION_URL }}
          WORKER_INGESTION_SECRET: ${{ secrets.WORKER_INGESTION_SECRET }}
        run: python workers/nato-diana/nato_diana_worker.py
